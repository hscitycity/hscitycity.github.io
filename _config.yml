title: 개발일지
description: >-
  코드를 만들면서 무엇을 시도했고, 무엇이 됐고 안 됐는지 남기는 기록.
  결과물뿐 아니라 과정과 이유를 같이 남깁니다.
baseurl: ""           # username.github.io 저장소이므로 빈 값 유지
url: "https://hscitycity.github.io"

theme: minima
minima:
  skin: classic
  social_links:
    - { platform: github, user_url: "https://github.com/hscitycity" }

plugins:
  - jekyll-feed
  - jekyll-seo-tag

permalink: /:year/:month/:day/:title/

show_excerpts: true

header_pages:
  - about.md

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

markdown: kramdown
